name: lazarus-exchange

services:
  lazarus-ui:
    image: lazarus-exchange-ui
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: unless-stopped
    depends_on:
      lazarus-api:
        condition: service_healthy
    ports:
      - target: 8080
        published: "${UI_PUBLISHED_PORT:-3000}"
        host_ip: "${UI_BIND_HOST:-127.0.0.1}"
        protocol: tcp
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - app

  lazarus-api:
    image: lazarus-exchange-api
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - app

networks:
  app:
    name: "${DOCKER_NETWORK_NAME:-lazarus-exchange}"
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
